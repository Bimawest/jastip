<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lacak Kurir - Realtime Route</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; }
        #map { width: 100%; height: 100vh; }
        .status-overlay { position: absolute; top: 10px; left: 10px; z-index: 1000; background: white; padding: 10px; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
    </style>
</head>
<body>
    <div class="status-overlay"><b>Status:</b> <span id="msg">Menunggu Kurir...</span></div>
    <div id="map"></div>

    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // Gunakan config yang sama dengan kurir
        const firebaseConfig = {
            apiKey: "AIzaSyCSwZqJAUvacT-oMJCtgp9tfCfCqxOM9CU",
            authDomain: "jastiptrackingbima.firebaseapp.com",
            databaseURL: "https://jastiptrackingbima-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "jastiptrackingbima"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let map, markerKurir, markerUser, routeLine;

        function initMap() {
            map = L.map('map').setView([-6.2000, 106.8166], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

            markerKurir = L.marker([0,0]).addTo(map).bindPopup("Kurir");
            markerUser = L.marker([0,0]).addTo(map).bindPopup("Saya (User)");
            routeLine = L.polyline([], {color: 'blue', weight: 5, dashArray: '10, 10'}).addTo(map);

            // 1. Kirim lokasi User ke Firebase agar Kurir bisa melihat
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    const myPos = [pos.coords.latitude, pos.coords.longitude];
                    markerUser.setLatLng(myPos);
                    db.ref('tracking/transaksi_1/user').set({ lat: pos.coords.latitude, lng: pos.coords.longitude });
                });
            }

            // 2. Pantau pergerakan Kurir
            db.ref('tracking/transaksi_1/kurir').on('value', snapshot => {
                const data = snapshot.val();
                if(data) {
                    const kurirPos = [data.lat, data.lng];
                    markerKurir.setLatLng(kurirPos);
                    updateRoute();
                    document.getElementById('msg').innerText = "Kurir sedang dalam perjalanan!";
                }
            });
        }

        function updateRoute() {
            const points = [markerKurir.getLatLng(), markerUser.getLatLng()];
            if (points[0].lat !== 0 && points[1].lat !== 0) {
                routeLine.setLatLngs(points);
                map.fitBounds(routeLine.getBounds(), {padding: [50, 50]});
            }
        }

        initMap();
    </script>
</body>
</html>

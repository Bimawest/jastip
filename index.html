<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lacak Pesanan - User (Hijau)</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; font-family: sans-serif; background: #f0f2f5; }
        #map { width: 100%; height: 65vh; }
        .overlay { position: absolute; bottom: 0; width: 100%; background: white; padding: 20px; z-index: 1000; border-radius: 25px 25px 0 0; box-shadow: 0 -5px 15px rgba(0,0,0,0.1); box-sizing: border-box; }
        .btn { border: none; padding: 15px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 8px; font-size: 16px; }
        #btnPilih { background: #007bff; color: white; }
        #btnTerima { background: #28a745; color: white; display: none; }
        #btnBatal { background: #dc3545; color: white; display: none; }
        #dialogBox { background: #e3f2fd; padding: 12px; margin-bottom: 12px; border-radius: 10px; border-left: 5px solid #007bff; font-size: 14px; color: #0d47a1; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="overlay">
        <div id="dialogBox"><b>Sistem:</b> Mencari lokasi Anda...</div>
        <button id="btnPilih" class="btn" onclick="pilihKurir()">Pilih Kurir Jastip</button>
        <button id="btnTerima" class="btn" onclick="selesaikanPesanan('Diterima')">Pesanan Telah Diterima</button>
        <button id="btnBatal" class="btn" onclick="selesaikanPesanan('Dibatalkan')">Batalkan Pengantaran</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCSwZqJAUvacT-oMJCtgp9tfCfCqxOM9CU",
            authDomain: "jastiptrackingbima.firebaseapp.com",
            databaseURL: "https://jastiptrackingbima-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "jastiptrackingbima",
            storageBucket: "jastiptrackingbima.firebasestorage.app",
            messagingSenderId: "187742172528",
            appId: "1:187742172528:web:0556ec9c738476faff0bb5"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let map, markerKurir, markerUser, routeLine;
        const greenIcon = new L.Icon({ iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-green.png', iconSize: [25, 41], iconAnchor: [12, 41] });
        const blueIcon = new L.Icon({ iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-blue.png', iconSize: [25, 41], iconAnchor: [12, 41] });

        function initMap() {
            map = L.map('map').setView([-6.2000, 106.8166], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            markerUser = L.marker([0,0], {icon: greenIcon}).addTo(map);
            markerKurir = L.marker([0,0], {icon: blueIcon}).addTo(map);
            routeLine = L.polyline([], {color: 'blue', weight: 3, dashArray: '5, 8'}).addTo(map);

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    const lat = pos.coords.latitude; const lng = pos.coords.longitude;
                    markerUser.setLatLng([lat, lng]);
                    map.setView([lat, lng], 15);
                    db.ref('tracking/transaksi_1/user').set({ lat, lng });
                    document.getElementById('dialogBox').innerHTML = "<b>Sistem:</b> Lokasi ditemukan. Silakan pilih kurir.";
                });
            }

            db.ref('tracking/transaksi_1').on('value', snap => {
                const data = snap.val();
                if (!data) {
                    resetUI();
                    return;
                }

                if (data.pesan) document.getElementById('dialogBox').innerHTML = `<b>Pesan:</b> ${data.pesan.teks}`;

                if (data.status === 'dipilih' || data.status === 'on_way') {
                    document.getElementById('btnPilih').style.display = "none";
                    document.getElementById('btnTerima').style.display = "block";
                    document.getElementById('btnBatal').style.display = "block";
                }

                if (data.kurir) {
                    const kPos = [data.kurir.lat, data.kurir.lng];
                    markerKurir.setLatLng(kPos);
                    routeLine.setLatLngs([markerUser.getLatLng(), kPos]);
                    // Auto zoom agar kurir & user terlihat
                    const group = new L.featureGroup([markerKurir, markerUser]);
                    map.fitBounds(group.getBounds().pad(0.2));
                }
            });
        }

        function pilihKurir() {
            db.ref('tracking/transaksi_1').update({ 
                status: 'dipilih',
                pesan: { teks: "Menunggu konfirmasi kurir..." }
            });
        }

        function selesaikanPesanan(aksi) {
            db.ref('tracking/transaksi_1').remove().then(() => {
                alert("Pesanan " + aksi);
                location.reload(); 
            });
        }

        function resetUI() {
            document.getElementById('btnPilih').style.display = "block";
            document.getElementById('btnTerima').style.display = "none";
            document.getElementById('btnBatal').style.display = "none";
            routeLine.setLatLngs([]);
        }
        initMap();
    </script>
</body>
</html>
